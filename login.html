<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="css.css" />
  <style>
    :root {
      --page-bg: #edf2fb;
      --panel-bg: #ffffff;
      --panel-border: #d7deea;
      --text-main: #202124;
      --text-muted: #5f6368;
      --accent: #1a73e8;
      --button-bg: #ffffff;
      --button-hover: #f7faff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--text-main);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: min(980px, calc(100vw - 24px));
      margin: 28px auto 16px;
    }

    .lang-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .lang-select {
      min-width: 112px;
      padding: 8px 10px;
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      background: #fff;
      font: inherit;
    }

    .shell {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(30, 41, 59, 0.06);
    }

    .shell-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--panel-border);
      font-size: 15px;
    }

    .google-mark {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: conic-gradient(#4285f4 0 25%, #34a853 25% 50%, #fbbc05 50% 75%, #ea4335 75% 100%);
      position: relative;
      flex: 0 0 auto;
    }

    .google-mark::after {
      content: "";
      position: absolute;
      inset: 3px;
      background: #fff;
      border-radius: 50%;
    }

    .content {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 32px;
      padding: 34px 36px;
    }

    .hero {
      padding-right: 8px;
    }

    .hero-logo {
      width: 48px;
      height: 48px;
      border: 2px solid #111827;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      margin-bottom: 26px;
    }

    .hero h1 {
      font-size: 54px;
      line-height: 1.02;
      font-weight: 400;
      margin: 0 0 18px;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      color: var(--text-muted);
    }

    .hero p strong {
      color: var(--accent);
      font-weight: 500;
    }

    .auth-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 360px;
    }

    .account-box {
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 18px;
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .google-button {
      width: 100%;
      border: 1px solid var(--panel-border);
      background: var(--button-bg);
      color: var(--text-main);
      border-radius: 18px;
      padding: 18px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s ease, border-color 0.15s ease;
      font: inherit;
    }

    .google-button:hover {
      background: var(--button-hover);
      border-color: #c2cbe0;
    }

    .account-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #d93025;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .account-copy {
      min-width: 0;
      flex: 1 1 auto;
    }

    .account-title {
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .account-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.35;
    }

    .status-box {
      min-height: 24px;
      margin: 8px 0 18px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .status-box.error {
      color: #b91c1c;
    }

    .status-box.success {
      color: #166534;
    }

    .success-action {
      display: none;
      margin-top: 10px;
    }

    .success-action.visible {
      display: block;
    }

    .success-link {
      width: 100%;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }

    .owner-password {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #d8e4df;
      border-radius: 12px;
      background: #f8fbfa;
    }

    .owner-password.visible {
      display: block;
    }

    .owner-password label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #315f4e;
      margin-bottom: 8px;
    }

    .owner-password input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #c6d7d0;
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      margin-bottom: 10px;
    }

    .owner-password button {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: #1d7a5f;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .meta-copy {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .meta-copy a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer {
      width: min(980px, calc(100vw - 24px));
      margin: 0 auto 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--text-muted);
      font-size: 14px;
      padding: 0 6px;
    }

    .footer-links {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .content {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 26px 22px;
      }

      .hero h1 {
        font-size: 40px;
      }

      .hero p {
        font-size: 22px;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: min(100vw - 12px, 980px);
        margin-top: 12px;
      }

      .shell {
        border-radius: 20px;
      }

      .shell-top {
        padding: 14px 16px;
      }

      .content {
        padding: 18px 16px 22px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .hero p {
        font-size: 20px;
      }

      .footer {
        width: min(100vw - 12px, 980px);
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="lang-row">
      <select id="langSelect" class="lang-select">
        <option value="tr">Turkce</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </div>

    <section class="shell">
      <div class="shell-top">
        <span class="google-mark" aria-hidden="true"></span>
        <span id="topLabel">Google ile giris yap</span>
      </div>

      <div class="content">
        <section class="hero">
          <div class="hero-logo" aria-hidden="true">M</div>
          <h1 id="title">Bir hesap secin</h1>
          <p id="subtitle">Devam etmek icin <strong id="brandName">Market Scraper</strong></p>
        </section>

        <section class="auth-panel">
          <div>
            <div class="account-box">
              <div class="section-label" id="accountSectionLabel">Gercek Gmail hesabinizi kullanin</div>
              <button id="googleSignInBtn" class="google-button" type="button">
                <span class="account-avatar">G</span>
                <span class="account-copy">
                  <div class="account-title" id="buttonTitle">Google ile devam et</div>
                  <div class="account-subtitle" id="buttonSubtitle">Hesap secme ekrani acilacak ve dogrudan Google ile devam edeceksiniz.</div>
                </span>
              </button>
            </div>

            <div id="authStatus" class="status-box"></div>
            <div id="successAction" class="success-action">
              <button id="goHomeBtn" class="success-link" type="button">Go to home page</button>
            </div>
            <div id="ownerPasswordBox" class="owner-password">
              <label id="ownerPasswordLabel" for="ownerPasswordInput">Enter owner password to proceed</label>
              <input id="ownerPasswordInput" type="password" autocomplete="current-password" />
              <button id="ownerPasswordBtn" type="button">Open owner page</button>
            </div>
          </div>

          <div class="meta-copy">
            <span id="policyText">Bu uygulamayi kullanmadan once</span>
            <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer" id="privacyLink">Gizlilik Politikasini</a>
            <span id="andText">ve</span>
            <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer" id="termsLink">Hizmet Sartlarini</a>
            <span id="reviewText">inceleyebilirsiniz.</span>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class="footer">
    <a href="index.html" id="backLink">&larr; Aramaya don</a>
    <div class="footer-links">
      <a href="https://support.google.com/accounts" target="_blank" rel="noopener noreferrer" id="helpLink">Yardim</a>
      <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer" id="footerPrivacyLink">Gizlilik</a>
      <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer" id="footerTermsLink">Sartlar</a>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      browserLocalPersistence,
      getAuth,
      getRedirectResult,
      GoogleAuthProvider,
      onAuthStateChanged,
      signInWithRedirect,
      setPersistence,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      doc,
      getDoc,
      getFirestore,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import firebaseConfig from "./firebase-config.js";

    const I18N = {
      tr: {
        topLabel: "Google ile giris yap",
        title: "Bir hesap secin",
        subtitlePrefix: "Devam etmek icin ",
        brandName: "Market Scraper",

        ownerPasswordLabel: "Devam etmek icin sahip sifresini girin",
        ownerPasswordBtn: "Sahip panelini ac",
        ownerPasswordError: "Sahip sifresi yanlis.",
        goHomeBtn: "Ana sayfaya git",
        errorGeneric: "Google ile giris basarisiz oldu.",
        errorUnauthorizedDomain: "Bu alan adi Firebase Authentication icin yetkili degil.",
        errorGoogleOnly: "Lutfen Gmail ile bagli bir Google hesabi kullanin.",
        errorPopupBlocked: "Tarayici popup penceresini engelledi. Popup izni verip tekrar deneyin.",
        errorOperationNotAllowed: "Firebase icinde Google giris yontemi etkin degil.",
        errorNetwork: "Ag hatasi var. Internet baglantisini kontrol edip tekrar deneyin.",
        errorCancelled: "Ayni anda birden fazla giris denemesi yapildi. Tekrar deneyin.",
        errorProfileLoad: "Hesap acildi fakat profil verisi okunamadi.",
        errorProfileSave: "Hesap acildi fakat profil verisi kaydedilemedi."
      },
      en: {
        topLabel: "Sign in with Google",
        title: "Choose an account",
        subtitlePrefix: "to continue to ",
        brandName: "Market Scraper",
        accountSectionLabel: "Use your real Gmail account",
        buttonTitle: "Continue with Google",
        buttonSubtitle: "The Google account chooser will open, then the app will continue automatically.",
        policyText: "Before using this app, you can review the",
        privacyLink: "Privacy Policy",
        andText: "and",
        termsLink: "Terms of Service",
        reviewText: ".",
        backLink: "Back to Search",
        helpLink: "Help",
        footerPrivacyLink: "Privacy",
        footerTermsLink: "Terms",
        statusStarting: "Opening Google sign-in...",
        statusChecking: "Checking account...",
        statusSuccess: "Login successful. Press the button below to return to the home page.",
        ownerPasswordLabel: "Enter your owner password to proceed",
        ownerPasswordBtn: "Open owner page",
        ownerPasswordError: "Incorrect owner password.",
        goHomeBtn: "Go to home page",
        errorGeneric: "Google sign-in failed.",
        errorUnauthorizedDomain: "This domain is not authorized for Firebase Authentication.",
        errorGoogleOnly: "Please use a real Google account with Gmail.",
        errorPopupBlocked: "The browser blocked the popup. Allow popups and try again.",
        errorOperationNotAllowed: "Google sign-in is not enabled in Firebase.",
        errorNetwork: "Network error. Check your connection and try again.",
        errorCancelled: "Multiple sign-in attempts were started. Try again.",
        errorProfileLoad: "The account signed in, but the profile data could not be loaded.",
        errorProfileSave: "The account signed in, but the profile data could not be saved."
      },
      ar: {
        topLabel: "تسجيل الدخول باستخدام Google",
        title: "اختر حسابا",
        subtitlePrefix: "للمتابعة إلى ",
        brandName: "Market Scraper",
        accountSectionLabel: "استخدم حساب Gmail الحقيقي الخاص بك",
        buttonTitle: "المتابعة باستخدام Google",
        buttonSubtitle: "ستفتح نافذة اختيار الحساب ثم سيتابع التطبيق تلقائيا بعد تسجيل الدخول.",
        policyText: "قبل استخدام هذا التطبيق، يمكنك مراجعة",
        privacyLink: "سياسة الخصوصية",
        andText: "و",
        termsLink: "شروط الخدمة",
        reviewText: ".",
        backLink: "العودة إلى البحث",
        helpLink: "مساعدة",
        footerPrivacyLink: "الخصوصية",
        footerTermsLink: "الشروط",
        statusStarting: "جار فتح تسجيل الدخول عبر Google...",
        statusChecking: "جار فحص الحساب...",
        statusSuccess: "تم تسجيل الدخول بنجاح. اضغط الزر أدناه للعودة إلى الصفحة الرئيسية.",
        goHomeBtn: "الذهاب إلى الصفحة الرئيسية",
        errorGeneric: "فشل تسجيل الدخول عبر Google.",
        errorUnauthorizedDomain: "اسم النطاق هذا غير مصرح به في Firebase Authentication.",
        errorGoogleOnly: "يرجى استخدام حساب Google حقيقي مرتبط بـ Gmail.",
        errorPopupBlocked: "قام المتصفح بحظر النافذة المنبثقة. اسمح بالنوافذ المنبثقة ثم حاول مرة أخرى.",
        errorOperationNotAllowed: "تسجيل الدخول عبر Google غير مفعل في Firebase.",
        errorNetwork: "يوجد خطأ في الشبكة. تحقق من الاتصال ثم حاول مرة أخرى.",
        errorCancelled: "تم بدء أكثر من محاولة تسجيل دخول. حاول مرة أخرى.",
        errorProfileLoad: "تم تسجيل الدخول لكن تعذر تحميل بيانات الملف الشخصي.",
        errorProfileSave: "تم تسجيل الدخول لكن تعذر حفظ بيانات الملف الشخصي."
      }
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    const OWNER_EMAIL = "hadi.naji145@gmail.com";
    const OWNER_PASSWORD = "123hadi456naji";

    let currentLang = localStorage.getItem("app_lang") || "tr";

    function t(key) {
      return (I18N[currentLang] && I18N[currentLang][key]) || I18N.tr[key] || key;
    }

    function normalizeGmail(email) {
      const value = String(email || "").trim().toLowerCase();
      const [local, domain] = value.split("@");
      if (domain === "gmail.com" || domain === "googlemail.com") {
        return `${local.replace(/\./g, "")}@gmail.com`;
      }
      return value;
    }

    function isOwnerEmail(email) {
      return normalizeGmail(email) === normalizeGmail(OWNER_EMAIL);
    }

    function setStatus(messageKey, isError = false) {
      const box = document.getElementById("authStatus");
      box.textContent = t(messageKey);
      box.className = "status-box" + (isError ? " error" : messageKey === "statusSuccess" ? " success" : "");
      const successAction = document.getElementById("successAction");
      if (successAction) {
        successAction.classList.toggle("visible", !isError && messageKey === "statusSuccess");
      }
      const ownerPasswordBox = document.getElementById("ownerPasswordBox");
      if (ownerPasswordBox) {
        ownerPasswordBox.classList.remove("visible");
      }
    }

    function setRawStatus(message, isError = false) {
      const box = document.getElementById("authStatus");
      box.textContent = message;
      box.className = "status-box" + (isError ? " error" : "");
      const successAction = document.getElementById("successAction");
      if (successAction) successAction.classList.remove("visible");
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
      document.getElementById("langSelect").value = currentLang;
      document.getElementById("topLabel").textContent = t("topLabel");
      document.getElementById("title").textContent = t("title");
      document.getElementById("accountSectionLabel").textContent = t("accountSectionLabel");
      document.getElementById("buttonTitle").textContent = t("buttonTitle");
      document.getElementById("buttonSubtitle").textContent = t("buttonSubtitle");
      document.getElementById("policyText").textContent = t("policyText") + " ";
      document.getElementById("privacyLink").textContent = t("privacyLink");
      document.getElementById("andText").textContent = " " + t("andText") + " ";
      document.getElementById("termsLink").textContent = t("termsLink");
      document.getElementById("reviewText").textContent = " " + t("reviewText");
      document.getElementById("backLink").innerHTML = "&larr; " + t("backLink");
      document.getElementById("helpLink").textContent = t("helpLink");
      document.getElementById("footerPrivacyLink").textContent = t("footerPrivacyLink");
      document.getElementById("footerTermsLink").textContent = t("footerTermsLink");
      document.getElementById("subtitle").innerHTML = `${t("subtitlePrefix")}<strong id="brandName">${t("brandName")}</strong>`;
      document.getElementById("goHomeBtn").textContent = t("goHomeBtn");
      document.getElementById("ownerPasswordLabel").textContent = t("ownerPasswordLabel");
      document.getElementById("ownerPasswordBtn").textContent = t("ownerPasswordBtn");
      document.title = t("topLabel");
    }

    function getFriendlyError(error) {
      const code = String(error?.code || "");
      if (code === "auth/unauthorized-domain") return t("errorUnauthorizedDomain");
      if (code === "auth/popup-blocked") return t("errorPopupBlocked");
      if (code === "auth/operation-not-allowed") return t("errorOperationNotAllowed");
      if (code === "auth/network-request-failed") return t("errorNetwork");
      if (code === "auth/cancelled-popup-request") return t("errorCancelled");
      return `${t("errorGeneric")} (${code || "unknown"})`;
    }

    function storeUserLocally(user, profile = {}) {
      localStorage.setItem("user_name", profile.name || user.displayName || user.email || "User");
      localStorage.setItem("user_uid", user.uid);
      localStorage.setItem("user_email", user.email || "");
      localStorage.setItem("user_phone", profile.phone || "");
      localStorage.setItem("user_address", profile.address || "");
      if (user.photoURL) {
        localStorage.setItem("user_photo", user.photoURL);
      } else {
        localStorage.removeItem("user_photo");
      }
    }

    async function syncUserRecord(user) {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      const existing = snap.exists() ? snap.data() : {};
      const mergedProfile = {
        ...existing,
        name: existing.name || user.displayName || user.email || "User",
        email: user.email || existing.email || "",
        photoURL: user.photoURL || existing.photoURL || "",
        role: existing.role || "user",
        lastLoginAt: new Date().toISOString(),
        createdAt: existing.createdAt || new Date().toISOString()
      };
      await setDoc(userRef, mergedProfile, { merge: true });
      return mergedProfile;
    }

    async function routeSignedInUser(user) {
      setStatus("statusChecking");
      try {
        if (!user.email || !/@gmail\.com$/i.test(user.email)) {
          await signOut(auth);
          setRawStatus(t("errorGoogleOnly"), true);
          return;
        }

        storeUserLocally(user, {
          name: user.displayName || user.email || "User",
          phone: localStorage.getItem("user_phone") || "",
          address: localStorage.getItem("user_address") || ""
        });

        try {
          const profile = await syncUserRecord(user);
          storeUserLocally(user, profile);
        } catch (error) {
          console.error("Profile sync failed", error);
        }

        setStatus("statusSuccess");
        if (isOwnerEmail(user.email)) {
          showOwnerPassword();
        }
      } catch (error) {
        console.error("Login routing failed", error);
        const messageKey = String(error?.code || "").startsWith("permission-")
          ? "errorProfileSave"
          : "errorProfileLoad";
        setRawStatus(`${t(messageKey)} (${String(error?.code || error?.message || "unknown")})`, true);
      }
    }

    function showOwnerPassword() {
      document.getElementById("successAction").classList.remove("visible");
      document.getElementById("ownerPasswordBox").classList.add("visible");
      document.getElementById("ownerPasswordInput").focus();
    }

    async function unlockOwnerPage() {
      const passwordInput = document.getElementById("ownerPasswordInput");
      if (passwordInput.value !== OWNER_PASSWORD) {
        setRawStatus(t("ownerPasswordError"), true);
        showOwnerPassword();
        return;
      }

      const uid = localStorage.getItem("user_uid");
      const email = localStorage.getItem("user_email");
      if (!uid || !isOwnerEmail(email)) {
        setRawStatus(t("errorGoogleOnly"), true);
        return;
      }

      localStorage.setItem("owner_access", "true");
      localStorage.setItem("owner_email", normalizeGmail(OWNER_EMAIL));
      try {
        await setDoc(doc(db, "users", uid), {
          role: "admin",
          ownerAccessAt: new Date().toISOString()
        }, { merge: true });
      } catch (error) {
        console.error("Owner role save failed", error);
      }
      window.location.href = "admin.html";
    }

    async function continueWithGoogle() {
      setStatus("statusStarting");
      try {
        await setPersistence(auth, browserLocalPersistence);
        await signInWithRedirect(auth, provider);
      } catch (error) {
        console.error("Google sign-in failed", error);
        setRawStatus(getFriendlyError(error), true);
      }
    }

    async function handleExistingSession() {
      await setPersistence(auth, browserLocalPersistence);
      try {
        const result = await getRedirectResult(auth);
        if (result?.user) {
          sessionStorage.setItem("login_auth_handled", result.user.uid);
          await routeSignedInUser(result.user);
          return;
        }
      } catch (error) {
        console.error("Google redirect sign-in failed", error);
        setRawStatus(getFriendlyError(error), true);
        return;
      }

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        const handledUid = sessionStorage.getItem("login_auth_handled");
        if (handledUid === user.uid) {
          storeUserLocally(user, {
            name: localStorage.getItem("user_name") || user.displayName || user.email || "User",
            phone: localStorage.getItem("user_phone") || "",
            address: localStorage.getItem("user_address") || ""
          });
          setStatus("statusSuccess");
          if (isOwnerEmail(user.email)) {
            showOwnerPassword();
          }
          return;
        }
        sessionStorage.setItem("login_auth_handled", user.uid);
        await routeSignedInUser(user);
      });
    }

    document.getElementById("langSelect").addEventListener("change", (event) => {
      currentLang = String(event.target.value || "tr");
      localStorage.setItem("app_lang", currentLang);
      applyLanguage();
    });

    document.getElementById("googleSignInBtn").addEventListener("click", continueWithGoogle);
    document.getElementById("goHomeBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });
    document.getElementById("ownerPasswordBtn").addEventListener("click", unlockOwnerPage);
    document.getElementById("ownerPasswordInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlockOwnerPage();
    });

    applyLanguage();
    handleExistingSession();
  </script>
</body>
</html>
