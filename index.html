<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dessert Cafe App</title>
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#c89b6d" />
        <link rel="stylesheet" href="css.css" />
        <style>
            #loadingScreen {
                position: fixed;
                inset: 0;
                background: linear-gradient(135deg, #f5e6d3, #fdf7f0);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }
            #loadingScreen.hidden {
                display: none;
            }
            .loader {
                width: 60px;
                height: 60px;
                border: 5px solid #e0d0c0;
                border-top-color: #c89b6d;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .loading-text {
                margin-top: 20px;
                font-size: 18px;
                color: #8b7355;
            }
            .loading-logo {
                font-size: 80px;
                margin-bottom: 20px;
            }
            .loading-status {
                margin-top: 15px;
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 14px;
            }
            .loading-status.connecting {
                background: #fff3cd;
                color: #856404;
            }
            .loading-status.waiting {
                background: #f8d7da;
                color: #721c24;
            }
            .loading-status.connected {
                background: #d4edda;
                color: #155724;
            }
            .retry-counter {
                margin-top: 10px;
                font-size: 12px;
                color: #a89078;
            }
            .app-header-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }
            .notif-btn {
                background: #c89b6d;
                border: none;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                font-size: 18px;
                cursor: pointer;
                transition: all 0.3s;
                opacity: 0.5;
            }
            .notif-btn:hover {
                transform: scale(1.1);
                opacity: 1;
            }
            .notif-btn.active {
                opacity: 1;
                background: #27ae60;
            }
        </style>
    </head>
    <body>
        <!-- Loading Screen -->
        <div id="loadingScreen">
            <div class="loading-logo">🍰</div>
            <div class="loader"></div>
            <div class="loading-text" id="loadingText">
                Connecting to server...
            </div>
            <div class="loading-status connecting" id="loadingStatus">
                Checking connection...
            </div>
            <div class="retry-counter" id="retryCounter"></div>
        </div>

        <!-- Language Switcher - Top Right -->
        <div id="langSwitcher" class="lang-switcher-top"></div>

        <div id="login">
            <h2>Login</h2>
            <input id="email" placeholder="Email" />
            <input id="password" type="password" placeholder="Password" />
            <button onclick="login()">Login / Register</button>
        </div>
        <div id="app" style="display: none">
            <div class="app-header-row">
                <h1 id="appTitle">Dessert Cafe Manager</h1>
                <button
                    id="notifBtn"
                    class="notif-btn"
                    onclick="toggleNotifications()"
                    title="Enable Notifications"
                >
                    🔔
                </button>
            </div>
            <div class="nav-buttons" id="navButtons">
                <button id="navMarket" onclick="switchTab('market')">
                    Market Prices
                </button>
            </div>

            <!-- MARKET TAB -->
            <section id="tab-market" class="tab-section">
                <h2 id="marketPricesTitle">Market Prices</h2>
                <div class="panel">
                    <label for="dessertSelect" id="dessertLabel">Dessert</label>
                    <select id="dessertSelect"></select>
                    <button
                        id="findPricesBtn"
                        onclick="findCheapestForSelectedDessert()"
                    >
                        Find Cheapest Market
                    </button>
                    <p class="hint" id="marketHint">
                        Uses ingredient quantities from Settings.
                    </p>
                </div>
                <div id="marketResult" class="panel"></div>
            </section>

            <!-- SETTINGS TAB (kept hidden for internal ingredient data handling) -->
            <section
                id="tab-settings"
                class="tab-section hidden"
                style="display: none"
            >
                <h2 id="ingredientsTitle">Ingredients and Quantity</h2>
                <div id="ingredientsSettings" class="panel"></div>
            </section>
        </div>

        <!-- Pick from Market Modal -->
        <div id="pickModal" class="modal-overlay hidden">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 id="pickModalTitle">Pick Item from Market</h3>
                    <button class="modal-close" onclick="closePickModal()">
                        X
                    </button>
                </div>
                <div class="modal-search-row">
                    <input
                        type="text"
                        id="pickSearchInput"
                        placeholder="Type product name and press Enter..."
                        onkeydown="pickSearchKeydown(event)"
                    />
                    <input
                        type="number"
                        id="pickQuantityInput"
                        min="0.01"
                        step="0.01"
                        placeholder="Qty"
                    />
                    <select id="pickQuantityUnit">
                        <option value="piece">piece</option>
                        <option value="g">g</option>
                        <option value="kg">kg</option>
                        <option value="ml">ml</option>
                        <option value="l">l</option>
                    </select>
                    <button
                        id="pickSearchBtn"
                        onclick="
                            runPickSearch(
                                document
                                    .getElementById('pickSearchInput')
                                    .value.trim(),
                            )
                        "
                    >
                        Search
                    </button>
                </div>
                <p class="modal-hint" id="pickModalHint">
                    The scraped name will fill the ingredient name field. You
                    set the quantity yourself.
                </p>
                <div id="pickResults" class="pick-results"></div>
                <div class="modal-footer">
                    <button
                        class="modal-clear-btn"
                        id="clearResultsBtn"
                        onclick="clearPickResults()"
                    >
                        Clear Results
                    </button>
                    <button
                        class="modal-close-btn"
                        id="closeModalBtn"
                        onclick="closePickModal()"
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>

        <audio
            id="alarm"
            src="https://www.soundjay.com/buttons/beep-01a.mp3"
        ></audio>
        <script>
            // Register Service Worker for Notifications
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("/sw.js")
                        .then((reg) =>
                            console.log(
                                "Service Worker registered:",
                                reg.scope,
                            ),
                        )
                        .catch((err) =>
                            console.log(
                                "Service Worker registration failed:",
                                err,
                            ),
                        );
                });
            }
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
        <script src="frontend.js"></script>
    </body>
</html>
