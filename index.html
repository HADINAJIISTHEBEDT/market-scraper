<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Arama</title>
    <link rel="stylesheet" href="css.css" />
    <style>
      body {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .search-row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }
      .search-row input {
        flex: 1;
        padding: 10px;
      }
      .search-row button {
        padding: 10px 16px;
        cursor: pointer;
      }
      .panel {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        margin-top: 14px;
        background: #fff;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }
      .item-card {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 10px;
      }
      .item-name {
        font-weight: 600;
        font-size: 14px;
      }
      .item-price {
        color: #065f46;
        margin-top: 6px;
      }
      #status {
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <div class="search-row">
      <h1 id="title" style="margin: 0">Market Urun Arama</h1>
      <select id="langSelect">
        <option value="tr">Turkce</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </div>
    <p id="subtitle">Kayitli urun yok. Sadece urun adini yazip ara.</p>
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Urun adi yazin..." />
      <button id="searchBtn" type="button">Ara</button>
    </div>
    <p id="status"></p>
    <div id="results"></div>
    <script src="frontend.js"></script>
  </body>
</html>
