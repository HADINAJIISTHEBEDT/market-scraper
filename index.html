<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pazar Fiyatı</title>
    <link rel="stylesheet" href="css.css" />
    <style>
      body {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
        background: #f7f8f4;
        color: #17221d;
      }

      .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 0 18px;
        border-bottom: 1px solid #e1e7df;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .brand-lockup {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 20px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
      }

      .nav-links {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .nav-links a {
        color: #1f5f4a;
        font-weight: 700;
        text-decoration: none;
      }

      .hero { padding: 22px 0 14px; }

      .hero h1 {
        font-size: clamp(34px, 6vw, 64px);
        line-height: 0.95;
        margin: 0 0 14px;
        letter-spacing: 0;
      }

      .hero p {
        color: #59665e;
        font-size: 17px;
        margin: 0;
        max-width: 620px;
      }

      .ad-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .ad-tile {
        min-height: 150px;
        border-radius: 12px;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        position: relative;
      }

      .ad-tile span {
        position: absolute;
        left: 10px;
        bottom: 10px;
        background: rgba(255, 255, 255, 0.92);
        color: #17221d;
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .search-panel {
        background: #fff;
        border: 1px solid #e1e7df;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(28, 51, 41, 0.08);
      }

      .search-row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }

      .search-row input {
        flex: 1;
        padding: 10px;
      }

      .search-row button {
        padding: 10px 16px;
        cursor: pointer;
      }

      #langSelect {
        width: auto;
        min-width: 86px;
        max-width: 104px;
        height: 32px;
        padding: 4px 8px;
        font-size: 13px;
      }

      .filter-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .filter-row input,
      .filter-row select {
        width: 100%;
      }

      .panel {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        margin-top: 14px;
        background: #fff;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }

      .item-card {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 10px;
        text-align: center;
      }

      .item-image {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 6px;
        margin-bottom: 8px;
      }

      .item-name {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 6px;
      }

      .item-price {
        color: #065f46;
        margin-top: 6px;
      }

      #status {
        min-height: 20px;
      }

      .contact-area {
        border-top: 1px solid #e2e8f0;
        margin-top: 32px;
        padding: 18px 0 4px;
      }

      .contact-link {
        background: none;
        border: 0;
        color: #2563eb;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 0;
        text-decoration: underline;
      }

      .contact-form {
        display: grid;
        gap: 10px;
        max-width: 560px;
        margin-top: 14px;
      }

      .contact-form label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      .contact-form input,
      .contact-form textarea {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit;
        padding: 10px;
      }

      .contact-form textarea {
        min-height: 120px;
        resize: vertical;
      }

      .contact-actions {
        display: flex;
        gap: 10px;
      }

      .contact-actions button {
        padding: 10px 16px;
        cursor: pointer;
      }

      @media (max-width: 820px) {
        body {
          padding: 16px;
        }

        .ad-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .search-row,
        .filter-row {
          grid-template-columns: 1fr;
          flex-direction: column;
        }
      }
    </style>
    <meta name="google-site-verification" content="CqKls7MwXVKFxDoXX5RwK3P7o2g4pCBRBPIarYxLkc8" />
  </head>
  <body>
    <div class="top-nav">
      <span class="brand-lockup"><img class="brand-mark" src="logo.png" alt="Pazar Fiyatı Logo" onerror="this.style.display='none'" /><span id="navBrand">Pazar Fiyatı</span></span>
      <div class="nav-links">
        <span id="navUser" style="font-size:14px;color:#334155;"></span>
        <a id="navCartBtn" href="cart.html" hidden>Cart (<span id="cartCount">0</span>)</a>
        <a id="navOrdersBtn" href="orders.html" hidden>Orders</a>
        <a id="navProfileBtn" href="profile.html" hidden>Profile</a>
        <a id="navLoginBtn" href="login.html" hidden>Login</a>
        <button id="navLogoutBtn" onclick="doLogout()" style="display:none;background:none;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;cursor:pointer;color:#b91c1c;font-weight:600;">Logout</button>
      </div>
    </div>

    <main id="homeView">
    <div class="hero">
      <section>
        <h1 id="title">Pazar Fiyatı</h1>
        <p id="subtitle">Find everyday items, compare choices quietly. Make sure to write product names in Turkish.</p>
      </section>
    </div>

    <section class="search-panel">
      <div class="search-row" style="justify-content:flex-end;">
        <select id="langSelect">
          <option value="tr">Turkce</option>
          <option value="en">English</option>
          <option value="ar">Arabic</option>
        </select>
      </div>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search for milk, bread, coffee..." />
        <button id="searchBtn" type="button">Search</button>
      </div>
      <div class="search-row filter-row">
        <select id="marketFilter">
          <option value="">All Sources</option>
          <option value="bim">BIM</option>
          <option value="a101">A101</option>
          <option value="sok">SOK</option>
          <option value="migros">Migros</option>
          
          <option value="tahtakale">Tahtakale</option>
          <option value="carrefour">Carrefour</option>
        </select>
        <select id="sortFilter">
          <option value="">Sort</option>
          <option value="asc">Price: Low > High</option>
          <option value="desc">Price: High > Low</option>
        </select>
        <input id="minPrice" type="number" placeholder="Min price" />
        <input id="maxPrice" type="number" placeholder="Max price" />
        <input id="itemLimit" type="number" placeholder="Item limit" min="1" max="100" />
      </div>
      <p id="status"></p>
    </section>

    <section class="ad-strip" aria-label="Featured items" style="margin-top:14px;">
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80')"><span>Fresh vegetables</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80')"><span>Bread and bakery</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1589927986089-35812388d1f4?auto=format&fit=crop&w=600&q=80')"><span>Daily groceries</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1519996529931-28324d5a630e?auto=format&fit=crop&w=600&q=80')"><span>Fruit</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=600&q=80')"><span>Rice and grains</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=600&q=80')"><span>Desserts</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1518977676601-b53f82aba655?auto=format&fit=crop&w=600&q=80')"><span>Potatoes</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1550583724-b2692b85b150?auto=format&fit=crop&w=600&q=80')"><span>Dairy</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1592924357228-91a4daadcfea?auto=format&fit=crop&w=600&q=80')"><span>Vegetables</span></div>
      <div class="ad-tile" style="background-image:url('https://images.unsplash.com/photo-1528825871115-3581a5387919?auto=format&fit=crop&w=600&q=80')"><span>Bananas</span></div>
    </section>
    </main>

    <section id="resultsView" hidden>
      <button id="backToSearchBtn" type="button" style="margin:16px 0;padding:10px 16px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;cursor:pointer;font-weight:700;">Back to search</button>
    </section>
    <div id="results"></div>

    <footer class="contact-area">
      <p><span id="contactPrompt">For any problem </span><button id="contactToggle" class="contact-link" type="button">contact us</button></p>
      <div id="contactFormWrap" hidden>
        <form class="contact-form" action="https://formsubmit.co/hadi.naji145@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="Pazar Fiyatı contact message" />
          <input type="hidden" name="_captcha" value="false" />
          <label>
            <span id="contactEmailLabel">Email</span>
            <input id="contactEmailInput" name="email" type="email" required />
          </label>
          <label>
            <span id="contactTitleLabel">Title</span>
            <input id="contactTitleInput" name="title" type="text" required />
          </label>
          <label>
            <span id="contactComponentLabel">Message</span>
            <textarea name="component" required></textarea>
          </label>
          <div class="contact-actions">
            <button id="contactSubmit" type="submit">Send message</button>
            <button id="contactClose" type="button">Close</button>
          </div>
        </form>
      </div>
    </footer>
    <script src="frontend.js"></script>
  </body>
</html>
