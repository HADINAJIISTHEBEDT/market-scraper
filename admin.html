<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css.css" />
  <style>
    body { max-width: 900px; margin: 0 auto; padding: 24px; }
    #adminGuard { display: none; }
    #accessDenied { text-align: center; margin-top: 80px; color: #b91c1c; }
    .order-card {
      border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 16px; margin-bottom: 16px; background: #fff;
    }
    .order-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
    .order-meta { font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .order-user { font-weight: 700; font-size: 15px; }
    .order-total { font-weight: 700; font-size: 16px; color: #1e293b; }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 600; margin-top: 4px;
    }
    .status-pending   { background: #fef9c3; color: #854d0e; }
    .status-preparing { background: #dbeafe; color: #1e40af; }
    .status-on-the-way{ background: #fce7f3; color: #9d174d; }
    .status-delivered  { background: #dcfce7; color: #166534; }
    .order-items { margin: 10px 0; font-size: 14px; color: #374151; }
    .order-item-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #f1f5f9; }
    .status-select {
      margin-top: 10px; padding: 8px 12px; border: 1px solid #cbd5e1;
      border-radius: 8px; font: inherit; font-size: 14px; cursor: pointer;
      background: #f8fafc;
    }
    .btn-update {
      margin-left: 8px; padding: 8px 16px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .btn-update:hover { background: #1d4ed8; }
    #loadingMsg { color: #64748b; text-align: center; margin: 40px 0; }
    .stats-row {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .stat-box {
      flex: 1; min-width: 120px; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 14px; text-align: center; background: #f8fafc;
    }
    .stat-num { font-size: 28px; font-weight: 800; color: #2563eb; }
    .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
    .nav-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 14px; border-bottom: 1px solid #e5e7eb;
    }
    .nav-bar a { color: #2563eb; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <div id="accessDenied">
    <h2>🚫 Access Denied</h2>
    <p>You must be an admin to view this page.</p>
    <a href="index.html">← Go back</a>
  </div>

  <div id="adminGuard">
    <div class="nav-bar">
      <span style="font-weight:800;font-size:20px;">🧑‍💻 Admin Panel</span>
      <a href="index.html">← Back to App</a>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-box"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-box"><div class="stat-num" id="statPending">-</div><div class="stat-label">⏳ Pending</div></div>
      <div class="stat-box"><div class="stat-num" id="statPreparing">-</div><div class="stat-label">👨‍🍳 Preparing</div></div>
      <div class="stat-box"><div class="stat-num" id="statOnWay">-</div><div class="stat-label">🚴 On the way</div></div>
      <div class="stat-box"><div class="stat-num" id="statDelivered">-</div><div class="stat-label">✅ Delivered</div></div>
    </div>

    <h2 style="margin-bottom:16px;">All Orders</h2>
    <p id="loadingMsg">Loading orders...</p>
    <div id="ordersList"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, query, orderBy,
      onSnapshot, doc, updateDoc, getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import firebaseConfig from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const userUid = localStorage.getItem("user_uid");

    // ── Check admin role ──────────────────────────────────────
    async function checkAdmin() {
      if (!userUid) return false;
      try {
        const snap = await getDoc(doc(db, "users", userUid));
        return snap.exists() && snap.data().role === "admin";
      } catch {
        return false;
      }
    }

    const isAdmin = await checkAdmin();
    if (!isAdmin) {
      document.getElementById("accessDenied").style.display = "block";
    } else {
      document.getElementById("adminGuard").style.display = "block";
      loadOrders();
    }

    // ── Helpers ───────────────────────────────────────────────
    const STATUSES = ["pending", "preparing", "on-the-way", "delivered"];
    const STATUS_LABELS = {
      "pending":    "⏳ Pending",
      "preparing":  "👨‍🍳 Preparing",
      "on-the-way": "🚴 On the way",
      "delivered":  "✅ Delivered"
    };

    function formatPrice(price) {
      return `${Number(price || 0).toFixed(2).replace(".", ",")} ₺`;
    }
    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString("tr-TR") + " " + d.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
    }
    function statusClass(s) {
      return "status-" + (s || "pending").replace(" ", "-");
    }

    // ── Update stats ──────────────────────────────────────────
    function updateStats(orders) {
      document.getElementById("statTotal").textContent = orders.length;
      document.getElementById("statPending").textContent = orders.filter(o => o.status === "pending").length;
      document.getElementById("statPreparing").textContent = orders.filter(o => o.status === "preparing").length;
      document.getElementById("statOnWay").textContent = orders.filter(o => o.status === "on-the-way").length;
      document.getElementById("statDelivered").textContent = orders.filter(o => o.status === "delivered").length;
    }

    // ── Render orders ─────────────────────────────────────────
    function renderOrders(orders) {
      updateStats(orders);
      const root = document.getElementById("ordersList");
      document.getElementById("loadingMsg").style.display = "none";

      if (!orders.length) {
        root.innerHTML = `<p style="color:#64748b;text-align:center;">No orders yet.</p>`;
        return;
      }

      root.innerHTML = orders.map(order => {
        const items = Array.isArray(order.items) ? order.items : [];
        const itemsHtml = items.map(item =>
          `<div class="order-item-row">
            <span>${item.name} × ${item.qty || 1} <small style="color:#64748b">(${item.market || ""})</small></span>
            <span>${formatPrice((item.price || 0) * (item.qty || 1))}</span>
          </div>`
        ).join("");

        const statusOptions = STATUSES.map(s =>
          `<option value="${s}" ${order.status === s ? "selected" : ""}>${STATUS_LABELS[s]}</option>`
        ).join("");

        return `<div class="order-card" id="card-${order.id}">
          <div class="order-header">
            <div>
              <div class="order-user">👤 ${order.userName || "Unknown"}</div>
              <div class="order-meta">${formatDate(order.createdAt)} · ID: ${order.id.slice(0, 8)}...</div>
              <span class="status-badge ${statusClass(order.status)}">${STATUS_LABELS[order.status] || order.status}</span>
            </div>
            <div class="order-total">${formatPrice(order.totalPrice)}</div>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
            <select class="status-select" id="sel-${order.id}">${statusOptions}</select>
            <button class="btn-update" onclick="updateStatus('${order.id}')">Update Status</button>
            <span id="msg-${order.id}" style="font-size:13px;color:#16a34a;"></span>
          </div>
        </div>`;
      }).join("");
    }

    // ── Update order status ───────────────────────────────────
    window.updateStatus = async function(orderId) {
      const sel = document.getElementById(`sel-${orderId}`);
      const newStatus = sel.value;
      const msgEl = document.getElementById(`msg-${orderId}`);
      try {
        await updateDoc(doc(db, "orders", orderId), { status: newStatus });
        msgEl.textContent = "✅ Updated!";
        setTimeout(() => { msgEl.textContent = ""; }, 2000);
      } catch (e) {
        msgEl.style.color = "#b91c1c";
        msgEl.textContent = "❌ " + e.message;
      }
    };

    // ── Real-time orders listener ─────────────────────────────
    function loadOrders() {
      const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snapshot) => {
        const orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderOrders(orders);
      });
    }
  </script>
</body>
</html>
